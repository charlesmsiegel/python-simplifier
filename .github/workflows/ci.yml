name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tooling
        run: python -m pip install --quiet pytest ruff

      - name: Lint (ruff)
        run: ruff check scripts tests

      - name: Smoke tests (every detector fires on its fixture, quiet on clean code)
        run: pytest -q

      # The ratchet (references/messy-repo-runbook.md, Phase 5): every bug-class
      # detector is currently clean on this repo's own code, and it stays that way.
      # If one of these reports anything, a real defect class has crept back in.
      - name: Ratchet — bug-class detectors stay clean on our own code
        run: |
          set -e
          failed=0
          for s in find_mutation_hazards find_exception_issues find_global_state \
                   find_resource_leaks find_security_issues find_debug_leftovers \
                   find_duplicate_definitions find_unawaited_coroutines \
                   find_local_imports find_import_cycles find_dependency_issues; do
            n=$(python scripts/$s.py scripts --format json | python -c "import sys,json;print(len(json.load(sys.stdin)))")
            if [ "$n" != "0" ]; then
              echo "::error::$s reports $n finding(s) on scripts/ — the ratchet only tightens"
              python scripts/$s.py scripts
              failed=1
            fi
          done
          exit $failed

      - name: Full analyzer report (informational)
        run: python scripts/analyze_all.py scripts --skip-duplicates || true
